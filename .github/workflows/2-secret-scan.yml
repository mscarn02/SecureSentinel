name: 2 - Secret Guard (Gitleaks)

on:
  push:
    branches:
      - main
  pull_request: # We want to scan code before it even merges to main

jobs:
  scan-secrets:
    name: Prevent Credential Leakage
    runs-on: ubuntu-latest
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # CRITICAL: Gitleaks needs the full git history to ensure a secret wasn't hidden in an older commit

      # THE SECURITY GATE: Running Gitleaks
      - name: Run Gitleaks Scanner
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Built-in GitHub token so Gitleaks can read the repo

      - name: Send Discord Alert on Faliure
        if: faliure()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content": "🚨 **CRITICAL SECURITY ALERT** 🚨\n**Repository:** mscarn02/SecureSentinel\n**Event:** Hardcoded Secret Detected by Gitleaks!\n**Action Required:** Code deployment blocked. Investigate immediately."}' \
          ${{ secrets.DISCORD_WEBHOOK }}