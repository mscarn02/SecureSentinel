name: 2 - Secret Guard (Gitleaks)

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  scan-secrets:
    name: Prevent Credential Leakage
    runs-on: ubuntu-latest
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # THE SECURITY GATE: Running Gitleaks
      - name: Run Gitleaks Scanner
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # THE NOTIFICATION LOOP: Push alert to Discord
      - name: Send Discord Alert on Failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content": "🚨 **CRITICAL SECURITY ALERT** 🚨\n**Repository:** mscarn02/SecureSentinel\n**Event:** Hardcoded Secret Detected by Gitleaks!\n**Action Required:** Code deployment blocked. Investigate immediately."}' \
          ${{ secrets.DISCORD_WEBHOOK }}