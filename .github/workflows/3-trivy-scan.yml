name: 3 - Dependency Shield (Trivy)

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  scan-dependencies:
    name: Software Composition Analysis (SCA)
    runs-on: ubuntu-latest
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # THE SECURITY GATE: Running Trivy
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'src/'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      # THE NOTIFICATION LOOP: Push alert to Discord
      - name: Send Discord Alert on Failure
        if: failure() 
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content": "🚨 **CRITICAL SECURITY ALERT** 🚨\n**Repository:** mscarn02/SecureSentinel\n**Event:** Vulnerable Python Dependencies Detected by Trivy (SCA)!\n**Action Required:** Code deployment blocked. Check GitHub Actions logs for CVE details."}' \
          ${{ secrets.DISCORD_WEBHOOK }}